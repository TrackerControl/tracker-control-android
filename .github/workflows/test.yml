name: Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add armv7-linux-androideabi aarch64-linux-android i686-linux-android x86_64-linux-android
          cargo install cargo-ndk

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wgbridge-rs/target
          key: cargo-${{ runner.os }}-${{ hashFiles('wgbridge-rs/Cargo.lock') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Rust unit tests
        run: cargo test --manifest-path wgbridge-rs/Cargo.toml

      - name: Run unit tests
        run: ./gradlew testGithubDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleGithubDebug

  instrumentation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add armv7-linux-androideabi aarch64-linux-android i686-linux-android x86_64-linux-android
          cargo install cargo-ndk

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wgbridge-rs/target
          key: cargo-android-${{ runner.os }}-${{ hashFiles('wgbridge-rs/Cargo.lock') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2.38.0
        with:
          api-level: 37
          arch: x86_64
          ndk: 27.2.12479018
          profile: pixel_7
          script: ./gradlew connectedGithubDebugAndroidTest
